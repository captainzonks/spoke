# ==============================================================================
# SPOKE HUB - TRAEFIK MIDDLEWARE CONFIGURATION (NO CROWDSEC)
# ==============================================================================
# Description: Middleware chains without CrowdSec — used when CROWDSEC_ENABLED=false
# Author: Matt Barham
# Created: 2026-03-15
# Version: 1.0.0
# ==============================================================================
# Note: deploy_hub_rules.sh deploys this file as hub_middlewares.yml when
#       CROWDSEC_ENABLED=false. Do not deploy both files simultaneously.
# ==============================================================================

http:
  middlewares:
    #======================================================
    #==================== CHAINS =========================
    #======================================================

    chain-no-auth:
      chain:
        middlewares:
          - rate-limit
          - secure-headers
          - real-ip

    chain-basic-auth:
      chain:
        middlewares:
          - rate-limit
          - secure-headers
          - real-ip
          - basic-auth

    chain-authentik:
      chain:
        middlewares:
          - rate-limit
          - secure-headers
          - real-ip
          - authentik

    chain-admin-strict:
      chain:
        middlewares:
          - rate-limit-strict
          - secure-headers
          - real-ip
          - authentik

    chain-media:
      chain:
        middlewares:
          - rate-limit-media
          - secure-headers
          - real-ip

    chain-media-auth:
      chain:
        middlewares:
          - rate-limit-media
          - secure-headers
          - real-ip
          - authentik

    chain-monitoring:
      chain:
        middlewares:
          - rate-limit-monitoring
          - secure-headers
          - real-ip

    chain-api:
      chain:
        middlewares:
          - rate-limit-api
          - secure-headers
          - real-ip

    chain-public:
      chain:
        middlewares:
          - rate-limit-public
          - secure-headers
          - real-ip

    chain-websocket:
      chain:
        middlewares:
          - secure-headers
          - real-ip

    chain-static-assets:
      chain:
        middlewares:
          - rate-limit-static
          - secure-headers
          - real-ip

    chain-upload:
      chain:
        middlewares:
          - rate-limit-media
          - secure-headers
          - real-ip

    chain-authentik-no-crowdsec:
      chain:
        middlewares:
          - rate-limit
          - secure-headers
          - real-ip
          - authentik

    chain-agent-api:
      chain:
        middlewares:
          - rate-limit-api
          - secure-headers
          - real-ip
          - basic-auth-agent

    chain-authentik-cors:
      chain:
        middlewares:
          - rate-limit
          - authentik-cors
          - authentik-server-headers
          - real-ip
          # No authentik - this is the auth provider itself

    #======================================================
    #==================== MIDDLEWARE COMPONENTS ==========
    #======================================================

    #==================== REAL IP DETECTION =============

    real-ip:
      plugin:
        htransformation:
          Rules:
            - Rule:
              Name: "Clear Real IP"
              Header: "X-Real-Ip"
              Value: ""
              Type: "Set"
            - Rule:
              Name: "Join Real IP"
              Header: "X-Real-Ip"
              HeaderPrefix: "^"
              Sep: " "
              Values:
                - "^Cf-Connecting-Ip"
              Type: "Join"

    #==================== AUTHENTICATION =================

    basic-auth:
      basicAuth:
        usersFile: '{{ env "HTPASSWD_FILE" }}'
        realm: "Spoke"

    basic-auth-agent:
      basicAuth:
        usersFile: '{{ env "AGENT_HTPASSWD_FILE" }}'
        realm: "Spoke Agent API"

    authentik:
      forwardAuth:
        address: "http://authentik:9000/outpost.goauthentik.io/auth/traefik"
        trustForwardHeader: true
        authResponseHeaders:
          - X-authentik-username
          - X-authentik-groups
          - X-authentik-entitlements
          - X-authentik-email
          - X-authentik-name
          - X-authentik-uid
          - X-authentik-jwt
          - X-authentik-meta-jwks
          - X-authentik-meta-outpost
          - X-authentik-meta-provider
          - X-authentik-meta-app
          - X-authentik-meta-version
          - Authorization
        authResponseHeadersRegex: "^X-authentik-.*$"

    authentik-server-headers:
      headers:
        hostsProxyHeaders:
          - "X-Forwarded-Host"
        stsSeconds: 63072000
        stsIncludeSubdomains: true
        stsPreload: true
        forceSTSHeader: true
        customFrameOptionsValue: SAMEORIGIN
        contentTypeNosniff: false
        browserXssFilter: true
        referrerPolicy: "no-referrer-when-downgrade"
        permissionsPolicy: "camera=(), microphone=(), geolocation=(), payment=(), usb=(), vr=()"
        customResponseHeaders:
          X-Robots-Tag: "none,noarchive,nosnippet,notranslate,noimageindex,"
          server: ""

    #==================== CORS CONFIGURATIONS ============

    authentik-cors:
      headers:
        accessControlAllowOriginList:
          - "null"
        accessControlAllowMethods:
          - GET
          - POST
          - OPTIONS
        accessControlAllowHeaders:
          - "Content-Type"
          - "Authorization"
          - "Accept"
          - "Origin"
          - "Referer"
        accessControlExposeHeaders:
          - "Location"
          - "Content-Type"
        accessControlMaxAge: 3600
        addVaryHeader: true
        accessControlAllowCredentials: true

    #==================== RATE LIMITING ==================

    rate-limit:
      rateLimit:
        average: 100
        burst: 50

    rate-limit-media:
      rateLimit:
        average: 500
        burst: 100
        period: 1m

    rate-limit-monitoring:
      rateLimit:
        average: 1000
        burst: 500
        period: 1m

    rate-limit-strict:
      rateLimit:
        average: 20
        burst: 10
        period: 1m

    rate-limit-api:
      rateLimit:
        average: 1000
        burst: 300
        period: 1m

    rate-limit-public:
      rateLimit:
        average: 150
        burst: 75
        period: 1m

    rate-limit-static:
      rateLimit:
        average: 2000
        burst: 1000
        period: 1m

    #==================== SECURITY HEADERS ===============

    secure-headers:
      headers:
        accessControlAllowMethods:
          - GET
          - OPTIONS
          - PUT
          - POST
          - DELETE
          - PATCH
        accessControlMaxAge: 100
        hostsProxyHeaders:
          - "X-Forwarded-Host"
        stsSeconds: 63072000
        stsIncludeSubdomains: true
        stsPreload: true
        forceSTSHeader: true
        customFrameOptionsValue: SAMEORIGIN
        contentTypeNosniff: true
        browserXssFilter: true
        referrerPolicy: "same-origin"
        permissionsPolicy: "camera=(), microphone=(), geolocation=(), payment=(), usb=(), vr=()"
        customResponseHeaders:
          X-Robots-Tag: "none,noarchive,nosnippet,notranslate,noimageindex,"
          server: ""

    #==================== PERFORMANCE =====================

    compression:
      compress:
        defaultEncoding: gzip
        minResponseBodyBytes: 1200
        includedContentTypes:
          - application/json
          - text/html
          - text/plain

    buffer:
      buffering:
        maxResponseBodyBytes: 2000000
        maxRequestBodyBytes: 10485760
        memRequestBodyBytes: 2097152
        memResponseBodyBytes: 2097152
        retryExpression: "IsNetworkError() && Attempts() <= 2"

    #==================== UTILITY ========================

    redirect-to-https:
      redirectScheme:
        scheme: https
