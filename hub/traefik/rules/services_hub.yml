    dummy-svc:
      loadBalancer:
        servers:
          - url: http://traefik:80

    #======================================================
    #==================== AUTHENTIK ======================
    #======================================================

    authentik-server-svc:
      loadBalancer:
        servers:
          - url: http://authentik:9000
